services:
  - type: web
    name: droppilot-agent
    runtime: node
    rootDir: agent
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: LCD_ENDPOINT
        sync: false
      - key: RPC_ENDPOINT
        sync: false
      - key: CHAIN_ID
        value: initiation-2
      - key: MODULE_ADDRESS
        sync: false
      - key: AGENT_MNEMONIC
        sync: false
      - key: GAS_DENOM
        value: uinit
      - key: POLL_INTERVAL_MS
        value: "5000"
      - key: CORS_ORIGIN
        sync: false
